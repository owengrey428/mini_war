<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini War - Step 1: Terrain Engine</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        canvas {
            background-color: black;
            /* Scale the 400x300 canvas up by 2x for better visibility */
            width: 800px; 
            height: 600px;
            /* Keep the pixels sharp, no blurry anti-aliasing */
            image-rendering: pixelated; 
            border: 2px solid #555;
            cursor: crosshair;
        }
        .instructions {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>Mini War - Destructible Terrain Test</h2>
    <canvas id="gameCanvas" width="400" height="300"></canvas>
    
    <div class="instructions">
        <p><strong>Click anywhere on the terrain to simulate a weapon impact (1.0 Damage).</strong></p>
        <p>Blue (3.0) -> Gray (2.0) -> White (1.0) -> Empty</p>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true }); // Optimizes pixel reading
    
    // Define our specific colors and their RGB values for the engine to read
    const COLORS = {
        BLUE:  { r: 0,   g: 0,   b: 255, a: 255 }, // Integrity 3.0
        GRAY:  { r: 128, g: 128, b: 128, a: 255 }, // Integrity 2.0
        WHITE: { r: 255, g: 255, b: 255, a: 255 }, // Integrity 1.0
        EMPTY: { r: 0,   g: 0,   b: 0,   a: 0   }  // Destroyed (Transparent)
    };

    // 1. GENERATE THE TERRAIN
    function generateTerrain() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear screen
        
        // Loop through every single X coordinate
        for (let x = 0; x < canvas.width; x++) {
            // Generate a simple wavy surface using sine waves
            let surfaceY = Math.floor(100 + Math.sin(x / 30) * 20 + Math.sin(x / 10) * 10);
            
            // Draw down to the bottom of the screen
            for (let y = surfaceY; y < canvas.height; y++) {
                if (y > 220) {
                    ctx.fillStyle = `rgba(${COLORS.BLUE.r}, ${COLORS.BLUE.g}, ${COLORS.BLUE.b}, 1)`; // Bedrock
                } else if (y > 160) {
                    ctx.fillStyle = `rgba(${COLORS.GRAY.r}, ${COLORS.GRAY.g}, ${COLORS.GRAY.b}, 1)`; // Middle ground
                } else {
                    ctx.fillStyle = `rgba(${COLORS.WHITE.r}, ${COLORS.WHITE.g}, ${COLORS.WHITE.b}, 1)`; // Surface
                }
                ctx.fillRect(x, y, 1, 1); // Draw 1x1 pixel
            }
        }
    }

    // 2. APPLY DAMAGE (PIXEL MODIFICATION)
    function applyDamage(targetX, targetY, radius, damageAmount) {
        // Grab the raw pixel data for the entire canvas
        let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let pixels = imageData.data;

        // Loop through a square bounding box around the impact zone
        for (let y = targetY - radius; y <= targetY + radius; y++) {
            for (let x = targetX - radius; x <= targetX + radius; x++) {
                
                // Keep the explosion inside the canvas bounds
                if (x >= 0 && x < canvas.width && y >= 0 && y < canvas.height) {
                    
                    // Check if the pixel is within the circular explosion radius using Pythagoras
                    let dx = x - targetX;
                    let dy = y - targetY;
                    if (dx * dx + dy * dy <= radius * radius) {
                        
                        // Find the pixel's index in the massive 1D array
                        let index = (y * canvas.width + x) * 4;
                        let r = pixels[index];
                        let g = pixels[index + 1];
                        let b = pixels[index + 2];
                        let a = pixels[index + 3];

                        // Skip already empty pixels
                        if (a === 0) continue; 

                        // Determine current integrity based on color
                        let currentIntegrity = 0;
                        if (b === 255 && r === 0) currentIntegrity = 3.0;        // BLUE
                        else if (r === 128 && g === 128) currentIntegrity = 2.0; // GRAY
                        else if (r === 255 && g === 255) currentIntegrity = 1.0; // WHITE

                        // Apply the damage
                        let newIntegrity = currentIntegrity - damageAmount;

                        // Update the pixel color based on its new integrity
                        if (newIntegrity >= 3.0) {
                            setPixel(pixels, index, COLORS.BLUE);
                        } else if (newIntegrity >= 2.0) {
                            setPixel(pixels, index, COLORS.GRAY);
                        } else if (newIntegrity >= 1.0) {
                            setPixel(pixels, index, COLORS.WHITE);
                        } else {
                            setPixel(pixels, index, COLORS.EMPTY); // Destroyed!
                        }
                    }
                }
            }
        }
        // Push the modified pixels back to the canvas instantly
        ctx.putImageData(imageData, 0, 0);
    }

    // Helper function to easily change a pixel's RGBA values
    function setPixel(pixels, index, color) {
        pixels[index] = color.r;
        pixels[index + 1] = color.g;
        pixels[index + 2] = color.b;
        pixels[index + 3] = color.a;
    }

    // 3. LISTEN FOR MOUSE CLICKS TO TEST
    canvas.addEventListener('mousedown', function(event) {
        // Calculate the mouse X/Y relative to the actual 400x300 canvas resolution
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        const clickX = Math.floor((event.clientX - rect.left) * scaleX);
        const clickY = Math.floor((event.clientY - rect.top) * scaleY);

        // Simulate a weapon hit: X, Y, 15-pixel radius, 1.0 damage
        applyDamage(clickX, clickY, 15, 1.0);
    });

    // Run the generation when the page loads
    generateTerrain();

</script>
</body>
</html>
